<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>售價計算器</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f5f7fa;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }
        .card {
            background: white;
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 400px;
        }
        h2 {
            margin-top: 0;
            color: #333;
            text-align: center;
            font-size: 1.5rem;
        }
        .formula {
            background: #eef2f7;
            padding: 10px;
            border-radius: 8px;
            font-size: 0.85rem;
            color: #666;
            text-align: center;
            margin-bottom: 20px;
        }
        .input-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #444;
        }
        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 1.1rem;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }
        input:focus {
            border-color: #007aff;
            outline: none;
        }
        .result-box {
            background: #f8f9fa;
            border-left: 4px solid #007aff;
            padding: 15px;
            border-radius: 0 8px 8px 0;
            margin-top: 20px;
        }
        .result-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            color: #555;
            font-size: 0.95rem;
        }
        .total {
            border-top: 1px dashed #ddd;
            padding-top: 10px;
            margin-top: 10px;
            font-weight: bold;
            color: #007aff;
            font-size: 1.3rem;
        }
    </style>
</head>
<body>

<div class="card">
    <h2>網拍售價計算器</h2>
    <div class="formula">公式：成本 + 10元(運費) + 30元(利潤)</div>
    
    <div class="input-group">
        <label for="cost">輸入商品成本 ($)</label>
        <input type="number" id="cost" placeholder="請輸入金額" oninput="calculate()">
    </div>
    
    <div class="result-box">
        <div class="result-item">
            <span>商品成本：</span>
            <span>$ <span id="res-cost">0</span></span>
        </div>
        <div class="result-item">
            <span>國際運費：</span>
            <span>+ $ 10</span>
        </div>
        <div class="result-item">
            <span>預期利潤：</span>
            <span>+ $ 30</span>
        </div>
        <div class="result-item total">
            <span>👉 建議售價：</span>
            <span>$ <span id="res-total">40</span></span>
        </div>
    </div>
</div>

<script>
    function calculate() {
        const costInput = document.getElementById('cost').value;
        const cost = parseFloat(costInput) || 0;
        
        const shipping = 10;
        const profit = 30;
        const total = cost + shipping + profit;
        
        document.getElementById('res-cost').innerText = cost.toFixed(2);
        document.getElementById('res-total').innerText = total.toFixed(2);
    }
</script>

</body>
</html>
