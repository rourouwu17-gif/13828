<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>售價計算器 (RMB 轉 TWD)</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f5f7fa;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }
        .card {
            background: white;
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 400px;
        }
        h2 {
            margin-top: 0;
            color: #333;
            text-align: center;
            font-size: 1.5rem;
        }
        .formula {
            background: #eef2f7;
            padding: 10px;
            border-radius: 8px;
            font-size: 0.85rem;
            color: #666;
            text-align: center;
            margin-bottom: 20px;
            line-height: 1.4;
        }
        .input-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #444;
        }
        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 1.1rem;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }
        input:focus {
            border-color: #007aff;
            outline: none;
        }
        .result-box {
            background: #f8f9fa;
            border-left: 4px solid #007aff;
            padding: 15px;
            border-radius: 0 8px 8px 0;
            margin-top: 20px;
        }
        .result-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            color: #555;
            font-size: 0.95rem;
        }
        .total {
            border-top: 1px dashed #ddd;
            padding-top: 10px;
            margin-top: 10px;
            font-weight: bold;
            color: #007aff;
            font-size: 1.3rem;
        }
    </style>
</head>
<body>

<div class="card">
    <h2>網拍售價計算器</h2>
    <div class="formula">
        公式：(人民幣成本 × 匯率 4.5) <br>+ 10元台幣(運費) + 30元台幣(利潤)
    </div>
    
    <div class="input-group">
        <label for="cost">輸入商品成本 (¥ 人民幣)</label>
        <input type="number" id="cost" placeholder="請輸入人民幣金額" oninput="calculate()">
    </div>
    
    <div class="result-box">
        <div class="result-item">
            <span>換算台幣成本：</span>
            <span>NT$ <span id="res-twd-cost">0</span></span>
        </div>
        <div class="result-item">
            <span>國際運費：</span>
            <span>+ NT$ 10</span>
        </div>
        <div class="result-item">
            <span>預期利潤：</span>
            <span>+ NT$ 30</span>
        </div>
        <div class="result-item total">
            <span>👉 建議零售價：</span>
            <span>NT$ <span id="res-total">40</span></span>
        </div>
    </div>
</div>

<script>
    function calculate() {
        // 取得輸入的人民幣
        const rmbCostInput = document.getElementById('cost').value;
        const rmbCost = parseFloat(rmbCostInput) || 0;
        
        // 設定匯率、運費與利潤
        const exchangeRate = 4.5; // 人民幣換台幣匯率
        const shipping = 10;     // 台幣運費
        const profit = 30;       // 台幣利潤
        
        // 計算台幣成本與最終售價
        const twdCost = rmbCost * exchangeRate;
        const total = twdCost + shipping + profit;
        
        // 渲染到網頁上
        document.getElementById('res-twd-cost').innerText = twdCost.toFixed(1);
        document.getElementById('res-total').innerText = Math.ceil(total); // 自動四捨五入/無條件進位到整數
    }
</script>

</body>
</html>
